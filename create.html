<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create | Lia's CSS Art Studio</title>
  <link rel="stylesheet" href="main.css" />
</head>
<body>
  <div class="page-wrapper">
    <header>
      <div class="logo">
        <h1>LIA'S<br>CSS ART<br>STUDIO</h1>
      </div>

      <div class="profile">
        <img src="images/sunshine.png" alt="Profile">
      </div>

      <nav class="desktop-nav">
        <a href="index.html">HOME</a>
        <a href="create.html">CREATE</a>
        <a href="tips.html">TIPS</a>
        <a href="about.html">ABOUT</a>
        <a href="gallery.html">GALLERY</a>
      </nav>

      <button id="hamburger" class="hamburger-icon">☰</button>
    </header>

    <div id="mobileMenu" class="mobile-menu">
      <button id="closeMenu" class="close-btn">✕</button>
      <a href="index.html">HOME</a>
      <a href="create.html">CREATE</a>
      <a href="tips.html">TIPS</a>
      <a href="about.html">ABOUT</a>
      <a href="gallery.html">GALLERY</a>
    </div>

    <main>
      <h2 class="welcome">* CREATE YOUR ART *</h2>

      <section style="width:85%; margin:0 auto; text-align:center;">
        <p>Write your HTML & CSS below and preview your artwork!</p>
      </section>

      <section class="editor-area">
        <div class="editor-box">
          <h3>HTML</h3>
          <textarea id="htmlBox" placeholder="<div class='circle'></div>"></textarea>
        </div>

        <div class="editor-box">
          <h3>CSS</h3>
          <textarea id="cssBox" placeholder=".circle { width:100px; height:100px; border-radius:50%; background:red; }"></textarea>
        </div>

        <div class="preview-box">
          <h3>PREVIEW</h3>
          <iframe id="preview"></iframe>
        </div>
      </section>

      <div style="text-align:center; margin-top:20px;">
        <button id="runButton" class="action-btn">RUN CODE</button>
      </div>
    </main>

    <footer>© 2026 CSS ART STUDIO | Lia Hood</footer>

    <script src="script.js"></script>
  </div>

</body>
</html>
