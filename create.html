    <main>
        <h2 class="welcome">* CREATE YOUR ART *</h2>

        <section style="width:85%; margin:0 auto; text-align:center;">
            <p>Write your HTML & CSS below and preview your artwork!</p>
        </section>

        <section class="editor-area">
            <div class="editor-box">
                <h3>HTML</h3>
                <textarea placeholder="<div class='circle'></div>"></textarea>
            </div>

            <div class="editor-box">
                <h3>CSS</h3>
                <textarea placeholder=".circle { width:100px; height:100px; border-radius:50%; background:red; }"></textarea>
            </div>

            <div class="preview-box">
                <h3>PREVIEW</h3>
                <div class="preview-window"></div>
            </div>
        </section>

        <div style="text-align:center; margin-top:20px;">
            <button class="action-btn">RUN CODE</button>
        </div>
